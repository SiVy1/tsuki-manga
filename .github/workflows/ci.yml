name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

env:
  AUTH_SECRET: ci-auth-secret
  APP_URL: http://127.0.0.1:3000
  APP_TIMEZONE: UTC
  ENABLE_TEST_AUTH: "true"
  TEST_AUTH_SHARED_SECRET: tsuki-test-secret

jobs:
  quality:
    name: Lint, Typecheck, Unit, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  